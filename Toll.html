<style>

/* =========================
RESET
========================= */

margin:0;
padding:0;

body{

/* =========================

MAIN

/* =========================
HEADER
========================= */

display:flex;
justify-content:space-between;
align-items:center;

}


.companyText{

/* =========================
PROFILE BUTTON
========================= */

align-items:center;
gap:5px;

padding:5px 10px;

}

PAGE SYSTEM
========================= */

}


.active{

}


/* =========================
CARD
========================= */

padding:15px;

border-radius:8px;

0 1px 4px rgba(0,0,0,0.08);

/* =========================
PROFILE TABLE
========================= */

font-size:12px;

}


.profileTable td{

padding:6px 8px;

text-align:left;

}


.profileTable td:first-child{

width:120px;
background:#fafafa;

}


.profileTable input{

width:100%;
border:none;
outline:none;

font-size:12px;
padding:3px;

}


/* =========================
BUTTON
========================= */

button{

padding:8px 12px;
border:none;

background:#173a67;
color:white;

font-size:11px;

border-radius:5px;

cursor:pointer;

}


/* =========================
INPUT HEADER
========================= */

.inputHeader{

display:flex;
justify-content:space-between;
align-items:flex-start;

margin-bottom:15px;

}


.inputTitle{

font-size:14px;
font-weight:bold;
color:#173a67;

}


/* =========================
PERIODE TABLE
========================= */

.periodeTable{

border-collapse:collapse;
font-size:11px;

}


.periodeTable td{

border:1px solid #d8d8d8;
padding:4px 6px;

}


.periodeTable select{

border:none;
outline:none;
font-size:11px;
padding:3px;

}


/* =========================
MAIN TABLE
========================= */

.mainTable{

width:100%;
border-collapse:collapse;
font-size:10px;

}


.mainTable th{

border:1px solid #d8d8d8;
padding:5px;

background:#173a67;
color:white;

text-align:center;

}


.mainTable td{

border:1px solid #d8d8d8;
padding:3px;

text-align:center;
vertical-align:middle;

}


.mainTable input{

width:100%;
border:none;
outline:none;

font-size:10px;
padding:3px;

}


/* =========================
TANGGAL CENTER
========================= */

.tanggalCell{

text-align:center !important;
vertical-align:middle !important;

}


.tanggalCell input{

text-align:center !important;
width:100%;
font-size:10px;

}


/* =========================
ACTION BUTTON
========================= */

.actionBtn{

background:transparent;
border:none;

cursor:pointer;
font-size:15px;

padding:2px;

}


/* =========================
SUBTOTAL
========================= */

.subtotalWrap{

display:flex;
justify-content:flex-end;

margin-top:10px;

}


.subtotalTable{

border-collapse:collapse;
font-size:11px;

}


.subtotalTable td{

border:1px solid #d8d8d8;
padding:5px 10px;

}


.subtotalTable td:first-child{

background:#fafafa;

}


/* =========================
ADD BUTTON
========================= */

.addRowWrap{

display:flex;
justify-content:flex-end;

margin-top:10px;

}


/* =========================
HOME
========================= */

.homeText{

height:80vh;

display:flex;
justify-content:center;
align-items:center;

font-size:22px;
color:#173a67;

}

</style>

</head>

<table

<thead>

<script>

/* ======================
PAGE NAVIGATION
====================== */

function showPage(id,el){

let pages=
document.querySelectorAll(
".page"
);

pages.forEach(function(p){

p.classList.remove(
"active"
);

});


document
.getElementById(id)
.classList.add(
"active"
);


let menus=
document.querySelectorAll(
".menu"
);

menus.forEach(function(m){

m.classList.remove(
"activeMenu"
);

});


if(el){

el.classList.add(
"activeMenu"
);

}

}

/* ======================
PROFILE SAVE
====================== */

function saveProfile(){

let ok=
confirm(
"Data sudah benar?"
);

if(!ok) return;


let data={

nama:
document.getElementById(
"nama"
).value,

nik:
document.getElementById(
"nik"
).value,

user:
document.getElementById(
"user"
).value,

lokasi:
document.getElementById(
"lokasi"
).value

};


localStorage.setItem(

"profileData",

JSON.stringify(data)

);


/* lock */

document.getElementById(
"nama"
).readOnly=true;

document.getElementById(
"nik"
).readOnly=true;

document.getElementById(
"user"
).readOnly=true;

document.getElementById(
"lokasi"
).readOnly=true;

}



/* ======================
EDIT PROFILE
====================== */

function editProfile(){

document.getElementById(
"nama"
).readOnly=false;

document.getElementById(
"nik"
).readOnly=false;

document.getElementById(
"user"
).readOnly=false;

document.getElementById(
"lokasi"
).readOnly=false;

}



/* ======================
LOAD PROFILE
====================== */

function loadProfile(){

let data=
localStorage.getItem(
"profileData"
);

if(!data) return;


let p=
JSON.parse(data);


document.getElementById(
"nama"
).value=
p.nama||"";


document.getElementById(
"nik"
).value=
p.nik||"";


document.getElementById(
"user"
).value=
p.user||"";


document.getElementById(
"lokasi"
).value=
p.lokasi||"";


/* readonly */

document.getElementById(
"nama"
).readOnly=true;

document.getElementById(
"nik"
).readOnly=true;

document.getElementById(
"user"
).readOnly=true;

document.getElementById(
"lokasi"
).readOnly=true;

}



/* ======================
ADD NEW ROW
====================== */

function addNewRow(){

let tbody=
document.getElementById(
"tableBody"
);


let num=
tbody.rows.length+1;


let tr=
document.createElement(
"tr"
);


tr.innerHTML=`

<td class="tanggalCell">

<input
class="tanggal"
style="text-align:center;"
maxlength="2"
inputmode="numeric"
oninput="onlyDate(this)">

</td>


<td class="noCell">

${num}

</td>


<td>

<input
class="start">

</td>


<td>

<input
class="arrive">

</td>


<td>

<input
class="parkingLoc">

</td>


<td>

<input
class="flazz"
oninput=
"formatRupiah(this);
calculateRow(this)">

</td>


<td>

<input
class="cash"
oninput=
"formatRupiah(this);
calculateRow(this)">

</td>


<td>

<input
class="km"
inputmode="numeric"
oninput=
"formatNumber(this)">

</td>


<td class="rowTotal">

</td>


<td>

<button
class="actionBtn"
onclick=
"saveRow(this)">

💾

</button>


<button
class="actionBtn"
onclick=
"editRow(this)">

✏️

</button>


<button
class="actionBtn"
onclick=
"deleteRow(this)">

🗑️

</button>

</td>

`;


tbody.appendChild(tr);

reNumberRows();

}



/* ======================
ONLY DATE
====================== */

function onlyDate(el){

el.value=
el.value.replace(
/[^0-9]/g,''
);


if(Number(el.value)>31){

el.value="31";

}

}



/* ======================
FORMAT KM
====================== */

function formatNumber(el){

let num=
el.value.replace(
/[^0-9]/g,''
);

if(!num){

el.value="";
return;

}

el.value=

Number(num)
.toLocaleString(
'id-ID'
);

}



/* ======================
FORMAT RUPIAH
====================== */

function formatRupiah(el){

let angka=
el.value.replace(
/[^0-9]/g,''
);


if(!angka){

el.value="";
return;

}


el.value=

"Rp " +

Number(angka)
.toLocaleString(
'id-ID'
);

}



/* ======================
PARSE CURRENCY
====================== */

function parseCurrency(str){

if(!str) return 0;


return Number(

str.replace(
/[^0-9]/g,''
)

)||0;

}



/* ======================
CALCULATE SINGLE ROW
====================== */

function calculateRow(el){

let row=
el.closest("tr");


let flazz=
row.querySelector(
".flazz"
).value;


let cash=
row.querySelector(
".cash"
).value;


let f=
parseCurrency(flazz);

let c=
parseCurrency(cash);


let total=
f+c;


/* jangan tampil Rp0 */

if(f===0 && c===0){

row.querySelector(
".rowTotal"
).innerText="";

}
else{

row.querySelector(
".rowTotal"
).innerText=

"Rp " +

total.toLocaleString(
'id-ID'
);

}


calculateSubtotal();

}



/* ======================
SUBTOTAL
====================== */

function calculateSubtotal(){

let total=0;


let rows=
document.querySelectorAll(
"#tableBody tr"
);


rows.forEach(function(row){

let flazz=
parseCurrency(

row.querySelector(
".flazz"
).value

);


let cash=
parseCurrency(

row.querySelector(
".cash"
).value

);


total+=
flazz+cash;

});


if(total===0){

document.getElementById(
"subTotal"
).innerText="";

}
else{

document.getElementById(
"subTotal"
).innerText=

"Rp " +

total.toLocaleString(
'id-ID'
);

}

}

/* ======================
GET CURRENT PERIOD
====================== */

function getCurrentPeriod(){

let bulan=
document.getElementById(
"bulan"
).value;

let tahun=
document.getElementById(
"tahun"
).value;


if(!bulan || !tahun){

return null;

}


return bulan+"-"+tahun;

}



/* ======================
SAVE ROW
PERIODE WAJIB
====================== */

function saveRow(btn){

let bulan=
document.getElementById(
"bulan"
).value;


let tahun=
document.getElementById(
"tahun"
).value;


/* wajib isi periode */

if(!bulan || !tahun){

alert(

"Pilih periode bulan dan tahun terlebih dahulu"

);

return;

}


let periode=
bulan+"-"+tahun;


let row=
btn.closest("tr");


let start=
row.querySelector(
".start"
).value.trim();


let arrive=
row.querySelector(
".arrive"
).value.trim();


let parking=
row.querySelector(
".parkingLoc"
).value.trim();


let flazz=
row.querySelector(
".flazz"
).value.trim();


let cash=
row.querySelector(
".cash"
).value.trim();



/* validasi */

if(

start!=="" ||

arrive!=="" ||

parking!==""

){

if(

flazz==="" ||

cash===""

){

alert(

"Flazz BCA dan Cash wajib diisi"

);

return;

}

}


/* confirm */

let ok=
confirm(
"Data sudah benar?"
);

if(!ok) return;


/* readonly */

let inputs=
row.querySelectorAll(
"input"
);

inputs.forEach(function(inp){

inp.readOnly=true;

});


/* save */

saveAllRows();


/* simpan periode terakhir */

localStorage.setItem(

"lastPeriod",

periode

);

}



/* ======================
EDIT ROW
====================== */

function editRow(btn){

let row=
btn.closest("tr");


let inputs=
row.querySelectorAll(
"input"
);


inputs.forEach(function(inp){

inp.readOnly=false;

});

}



/* ======================
DELETE ROW
====================== */

function deleteRow(btn){

let ok=
confirm(
"Hapus data ini?"
);

if(!ok) return;


let row=
btn.closest("tr");

row.remove();


reNumberRows();

calculateSubtotal();

saveAllRows();

}



/* ======================
SAVE ALL ROWS
====================== */

function saveAllRows(){

let periode=
getCurrentPeriod();

if(!periode) return;


let rows=
document.querySelectorAll(
"#tableBody tr"
);


let data=[];


rows.forEach(function(row){

let obj={

tanggal:
row.querySelector(
".tanggal"
).value,

start:
row.querySelector(
".start"
).value,

arrive:
row.querySelector(
".arrive"
).value,

parking:
row.querySelector(
".parkingLoc"
).value,

flazz:
row.querySelector(
".flazz"
).value,

cash:
row.querySelector(
".cash"
).value,

km:
row.querySelector(
".km"
).value,

locked:
row.querySelector(
".start"
).readOnly

};


data.push(obj);

});


let allData=
JSON.parse(

localStorage.getItem(
"tollParkData"
)

)||{};


allData[periode]=data;


localStorage.setItem(

"tollParkData",

JSON.stringify(allData)

);


/* save periode terakhir */

localStorage.setItem(

"lastPeriod",

periode

);

}



/* ======================
LOAD DATA PER PERIODE
====================== */

function loadPeriodData(){

let periode=
getCurrentPeriod();

if(!periode) return;


let allData=
JSON.parse(

localStorage.getItem(
"tollParkData"
)

)||{};


let data=
allData[periode]||[];


let tbody=
document.getElementById(
"tableBody"
);


tbody.innerHTML="";


/* kosong */

if(data.length===0){

addNewRow();

return;

}


/* render */

data.forEach(function(d,i){

let tr=
document.createElement(
"tr"
);


tr.innerHTML=`

<td class="tanggalCell">

<input
class="tanggal"
style="text-align:center;"
value="${d.tanggal}"
maxlength="2"
inputmode="numeric"
oninput="onlyDate(this)">

</td>


<td class="noCell">

${i+1}

</td>


<td>

<input
class="start"
value="${d.start}">

</td>


<td>

<input
class="arrive"
value="${d.arrive}">

</td>


<td>

<input
class="parkingLoc"
value="${d.parking}">

</td>


<td>

<input
class="flazz"
value="${d.flazz}"
oninput=
"formatRupiah(this);
calculateRow(this)">

</td>


<td>

<input
class="cash"
value="${d.cash}"
oninput=
"formatRupiah(this);
calculateRow(this)">

</td>


<td>

<input
class="km"
value="${d.km}"
inputmode="numeric"
oninput=
"formatNumber(this)">

</td>


<td class="rowTotal">

</td>


<td>

<button
class="actionBtn"
onclick=
"saveRow(this)">

💾

</button>


<button
class="actionBtn"
onclick=
"editRow(this)">

✏️

</button>


<button
class="actionBtn"
onclick=
"deleteRow(this)">

🗑️

</button>

</td>

`;


tbody.appendChild(tr);


/* restore readonly */

if(d.locked){

let inputs=
tr.querySelectorAll(
"input"
);

inputs.forEach(function(inp){

inp.readOnly=true;

});

/* ======================

/* ======================
MERGE TANGGAL
====================== */

function mergeTanggal(){

let rows=
Array.from(

document.querySelectorAll(
"#tableBody tr"
)

);


if(rows.length===0) return;


/* reset */

rows.forEach(function(row){

row.cells[0].style.display="";

row.cells[0].rowSpan=1;

});


let groups={};


/* grouping */

rows.forEach(function(row){

let tanggal=
row.querySelector(
".tanggal"
).value.trim();


if(!tanggal) return;


if(!groups[tanggal]){

groups[tanggal]=[];

}


groups[tanggal].push(row);

});


/* merge cell */

Object.keys(groups)
.forEach(function(tgl){

let arr=
groups[tgl];


if(arr.length>1){

arr[0].cells[0].rowSpan=
arr.length;


/* hide cell bawah */

for(
let i=1;
i<arr.length;
i++
){

arr[i].cells[0]
.style.display=
"none";

}

}

});


reNumberRows();

updateGroupTotal();

}

/* ======================
TOTAL PER DATE GROUP
====================== */

function updateGroupTotal(){

let rows=
Array.from(

document.querySelectorAll(
"#tableBody tr"
)

);


if(rows.length===0) return;


/* kosongkan total semua */

rows.forEach(function(row){

row.querySelector(
".rowTotal"
).innerText="";

});


let groups={};


/* grouping */

rows.forEach(function(row){

let tanggal=
row.querySelector(
".tanggal"
).value.trim();


if(!tanggal) return;


if(!groups[tanggal]){

groups[tanggal]=[];

}


groups[tanggal].push(row);

});


/* hitung total tiap grup */

Object.keys(groups)
.forEach(function(tgl){

let arr=
groups[tgl];

let totalGroup=0;


/* jumlah semua row */

arr.forEach(function(row){

let flazz=
parseCurrency(

row.querySelector(
".flazz"
).value

);


let cash=
parseCurrency(

row.querySelector(
".cash"
).value

);


totalGroup+=
flazz+cash;

});


/* kosongkan row atas */

for(
let i=0;
i<arr.length-1;
i++
){

arr[i]
.querySelector(
".rowTotal"
).innerText="";

}


/* hanya row terakhir */

let lastRow=

arr[
arr.length-1
];


/* jika total kosong */

if(totalGroup===0){

lastRow
.querySelector(
".rowTotal"
).innerText="";

}
else{

lastRow
.querySelector(
".rowTotal"
).innerText=

"Rp " +

totalGroup.toLocaleString(
'id-ID'
);

}

});


calculateSubtotal();

}

/* ======================
RESTORE LAST PERIOD
====================== */

function restoreLastPeriod(){

let lastPeriod=

localStorage.getItem(
"lastPeriod"
);


/* belum pernah simpan */

if(!lastPeriod){

let tbody=
document.getElementById(
"tableBody"
);

if(tbody.rows.length===0){

addNewRow();

}

return;

}


/* format bulan-tahun */

let arr=
lastPeriod.split("-");


if(arr.length!==2){

addNewRow();

return;

}


/* isi dropdown otomatis */

document.getElementById(
"bulan"
).value=
arr[0];


document.getElementById(
"tahun"
).value=
arr[1];


/* tampilkan data sesuai periode */

loadPeriodData();

}
